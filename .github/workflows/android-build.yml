name: Android CI - Build APKs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ══════════════════════════════════════════════
  # Job 1: Build Debug APK
  # ══════════════════════════════════════════════
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK 17 ──
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        id: setup-java
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Setup Gradle (يثبّت gradle CLI مباشرة) ──
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ── 4. Install Android SDK ──
      - name: Install Android SDK
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.java-home }}
          ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
        run: |
          echo ">>> Installing Android SDK..."
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"

          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
            -O /tmp/cmdline-tools.zip

          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-tmp
          mv /tmp/cmdline-tools-tmp/cmdline-tools "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          rm -rf /tmp/cmdline-tools.zip /tmp/cmdline-tools-tmp

          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            --sdk_root="$ANDROID_SDK_ROOT" --licenses > /dev/null 2>&1 || true

          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            --sdk_root="$ANDROID_SDK_ROOT" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"

      # ── 5. Create local.properties ──
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo ">>> local.properties:"
          cat local.properties

      # ── 6. Show project structure ──
      - name: Show project structure
        run: |
          echo "=== Root files ==="
          ls -la
          echo ""
          echo "=== Looking for build files ==="
          find . -name "build.gradle*" -not -path "*/build/*" | head -20
          echo ""
          echo "=== Looking for settings ==="
          find . -name "settings.gradle*" | head -5
          echo ""
          echo "=== Looking for gradlew ==="
          find . -name "gradlew" | head -5 || echo "No gradlew found (OK - using gradle CLI)"

      # ── 7. Build Debug APK (using gradle, NOT ./gradlew) ──
      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace --info

      # ── 8. Upload ──
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

  # ══════════════════════════════════════════════
  # Job 2: Build Release APK
  # ══════════════════════════════════════════════
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: build-debug

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        id: setup-java
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.java-home }}
          ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
        run: |
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
            -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-tmp
          mv /tmp/cmdline-tools-tmp/cmdline-tools "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          rm -rf /tmp/cmdline-tools.zip /tmp/cmdline-tools-tmp
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            --sdk_root="$ANDROID_SDK_ROOT" --licenses > /dev/null 2>&1 || true
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            --sdk_root="$ANDROID_SDK_ROOT" \
            "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      # ── Check for signing keystore ──
      - name: Check for signing keystore
        id: check-keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "has_keystore=true" >> "$GITHUB_OUTPUT"
            echo ">>> Keystore secret found"
          else
            echo "has_keystore=false" >> "$GITHUB_OUTPUT"
            echo ">>> No keystore secret found — will build unsigned"
          fi

      # ── Decode keystore ──
      - name: Decode keystore from secrets
        if: steps.check-keystore.outputs.has_keystore == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore/release.jks
          ls -la keystore/release.jks

      # ── Build Signed Release ──
      - name: Build Signed Release APK
        if: steps.check-keystore.outputs.has_keystore == 'true'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          gradle assembleRelease --no-daemon --stacktrace --info \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/keystore/release.jks" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      # ── Build Unsigned Release ──
      - name: Build Unsigned Release APK
        if: steps.check-keystore.outputs.has_keystore != 'true'
        run: |
          gradle assembleRelease --no-daemon --stacktrace --info

      # ── Upload ──
      - name: Upload Signed Release APK
        if: steps.check-keystore.outputs.has_keystore == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn

      - name: Upload Unsigned Release APK
        if: steps.check-keystore.outputs.has_keystore != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: warn
