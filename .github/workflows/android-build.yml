name: Android CI - Build APKs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  ANDROID_HOME: ${{ runner.temp }}/android-sdk
  CMDLINE_TOOLS_VERSION: "11076708"
  GRADLE_VERSION: "8.7"

jobs:
  # ══════════════════════════════════════════════
  # Job 1: Build Debug APK
  # ══════════════════════════════════════════════
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK ──
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        id: setup-java
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. تشخيص: افحص بنية المشروع ──
      - name: Diagnose project structure
        run: |
          echo "============================================"
          echo "  Repository root contents:"
          echo "============================================"
          ls -la
          echo ""
          echo "============================================"
          echo "  Looking for gradlew anywhere:"
          echo "============================================"
          find . -name "gradlew" -type f 2>/dev/null || echo "No gradlew found"
          echo ""
          echo "============================================"
          echo "  Looking for build.gradle files:"
          echo "============================================"
          find . -name "build.gradle*" -type f 2>/dev/null || echo "No build.gradle found"
          echo ""
          echo "============================================"
          echo "  Looking for settings.gradle:"
          echo "============================================"
          find . -name "settings.gradle*" -type f 2>/dev/null || echo "No settings.gradle found"
          echo ""

      # ── 4. تحديد مسار المشروع ──
      - name: Detect project directory
        id: detect
        run: |
          # ابحث عن build.gradle أو settings.gradle
          PROJECT_DIR=""

          if [ -f "./settings.gradle.kts" ] || [ -f "./settings.gradle" ]; then
            PROJECT_DIR="."
          elif [ -f "./app/build.gradle.kts" ] || [ -f "./app/build.gradle" ]; then
            PROJECT_DIR="."
          else
            # ابحث في المجلدات الفرعية
            FOUND=$(find . -name "settings.gradle.kts" -o -name "settings.gradle" | head -1)
            if [ -n "$FOUND" ]; then
              PROJECT_DIR=$(dirname "$FOUND")
            fi
          fi

          if [ -z "$PROJECT_DIR" ]; then
            echo "::error::Could not find Android project in repository!"
            echo "Make sure settings.gradle.kts or build.gradle.kts exists."
            exit 1
          fi

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo ">>> Detected project directory: $PROJECT_DIR"

      # ── 5. إنشاء Gradle Wrapper إذا لم يكن موجوداً ──
      - name: Setup Gradle Wrapper
        id: gradle-setup
        env:
          PROJECT_DIR: ${{ steps.detect.outputs.project_dir }}
        run: |
          cd "$PROJECT_DIR"

          if [ -f "./gradlew" ]; then
            echo ">>> gradlew found in $PROJECT_DIR"
            echo "gradlew_path=./gradlew" >> "$GITHUB_OUTPUT"
          else
            echo ">>> gradlew NOT found — generating with Gradle action..."
            echo "gradlew_path=GENERATED" >> "$GITHUB_OUTPUT"
          fi

      # ── 6. تثبيت Gradle وتوليد Wrapper إن لزم ──
      - name: Install Gradle & Generate Wrapper
        if: steps.gradle-setup.outputs.gradlew_path == 'GENERATED'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Generate missing Gradle Wrapper
        if: steps.gradle-setup.outputs.gradlew_path == 'GENERATED'
        env:
          PROJECT_DIR: ${{ steps.detect.outputs.project_dir }}
        run: |
          cd "$PROJECT_DIR"
          gradle wrapper --gradle-version ${{ env.GRADLE_VERSION }}
          echo ">>> Wrapper generated:"
          ls -la gradlew gradle/wrapper/

      # ── 7. جعل gradlew قابل للتنفيذ ──
      - name: Make gradlew executable
        env:
          PROJECT_DIR: ${{ steps.detect.outputs.project_dir }}
        run: |
          cd "$PROJECT_DIR"
          chmod +x ./gradlew
          echo ">>> gradlew is now executable"
          ./gradlew --version

      # ── 8. Cache Gradle ──
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties', '**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 9. تثبيت Android SDK ──
      - name: Install Android SDK
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.java-home }}
        run: |
          echo ">>> Setting up Android SDK at $ANDROID_HOME"
          mkdir -p "$ANDROID_HOME/cmdline-tools"

          wget -q --show-progress \
            "https://dl.google.com/android/repository/commandlinetools-linux-${{ env.CMDLINE_TOOLS_VERSION }}_latest.zip" \
            -O /tmp/cmdline-tools.zip

          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-tmp
          mv /tmp/cmdline-tools-tmp/cmdline-tools "$ANDROID_HOME/cmdline-tools/latest"
          rm -rf /tmp/cmdline-tools.zip /tmp/cmdline-tools-tmp

          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            --sdk_root="$ANDROID_HOME" --licenses > /dev/null 2>&1 || true

          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            --sdk_root="$ANDROID_HOME" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      # ── 10. إنشاء local.properties ──
      - name: Create local.properties
        env:
          PROJECT_DIR: ${{ steps.detect.outputs.project_dir }}
        run: |
          echo "sdk.dir=$ANDROID_HOME" > "$PROJECT_DIR/local.properties"
          echo ">>> Created local.properties in $PROJECT_DIR:"
          cat "$PROJECT_DIR/local.properties"

      # ── 11. بناء Debug APK ──
      - name: Build Debug APK
        env:
          PROJECT_DIR: ${{ steps.detect.outputs.project_dir }}
        run: |
          cd "$PROJECT_DIR"
          ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 12. رفع الـ APK ──
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ${{ steps.detect.outputs.project_dir }}/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

  # ══════════════════════════════════════════════
  # Job 2: Build Release APK
  # ══════════════════════════════════════════════
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: build-debug

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        id: setup-java
        with:
          distribution: temurin
          java-version: '17'

      - name: Detect project directory
        id: detect
        run: |
          PROJECT_DIR="."
          if [ -f "./settings.gradle.kts" ] || [ -f "./settings.gradle" ]; then
            PROJECT_DIR="."
          else
            FOUND=$(find . -name "settings.gradle.kts" -o -name "settings.gradle" | head -1)
            if [ -n "$FOUND" ]; then
              PROJECT_DIR=$(dirname "$FOUND")
            fi
          fi
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Setup Gradle Wrapper
        run: |
          cd "${{ steps.detect.outputs.project_dir }}"
          if [ ! -f "./gradlew" ]; then
            gradle wrapper --gradle-version ${{ env.GRADLE_VERSION }}
          fi
          chmod +x ./gradlew

      - name: Install Gradle (if needed)
        if: success()
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Install Android SDK
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.java-home }}
        run: |
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-${{ env.CMDLINE_TOOLS_VERSION }}_latest.zip" -O /tmp/cmd.zip
          unzip -q /tmp/cmd.zip -d /tmp/cmd-tmp
          mv /tmp/cmd-tmp/cmdline-tools "$ANDROID_HOME/cmdline-tools/latest"
          rm -rf /tmp/cmd.zip /tmp/cmd-tmp
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_HOME" --licenses > /dev/null 2>&1 || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_HOME" \
            "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > ${{ steps.detect.outputs.project_dir }}/local.properties

      # ── التوقيع ──
      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore/release.jks

      - name: Build Signed Release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd ${{ steps.detect.outputs.project_dir }}
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -Pandroid.injected.signing.store.file=../keystore/release.jks \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Build Unsigned Release APK
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        run: |
          cd ${{ steps.detect.outputs.project_dir }}
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ${{ steps.detect.outputs.project_dir }}/app/build/outputs/apk/release/app-release*.apk
          if-no-files-found: warn
