name: Android CI - Build APKs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ══════════════════════════════════════════════
  # Job 1: Build Debug APK
  # ══════════════════════════════════════════════
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    env:
      CMDLINE_TOOLS_VERSION: "11076708"
      GRADLE_VERSION: "8.7"

    steps:
      # ── 1. Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK 17 ──
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        id: setup-java
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Cache Gradle ──
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties', '**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 4. Install Android SDK ──
      - name: Install Android SDK
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.java-home }}
          ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
        run: |
          echo ">>> Installing Android SDK at $ANDROID_SDK_ROOT"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"

          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-${CMDLINE_TOOLS_VERSION}_latest.zip" \
            -O /tmp/cmdline-tools.zip

          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-tmp
          mv /tmp/cmdline-tools-tmp/cmdline-tools "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          rm -rf /tmp/cmdline-tools.zip /tmp/cmdline-tools-tmp

          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            --sdk_root="$ANDROID_SDK_ROOT" --licenses > /dev/null 2>&1 || true

          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            --sdk_root="$ANDROID_SDK_ROOT" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"

      # ── 5. Detect project & create local.properties ──
      - name: Detect project and create local.properties
        id: detect
        run: |
          echo ">>> Searching for project structure..."
          find . -name "settings.gradle*" -type f
          find . -name "build.gradle*" -type f
          find . -name "gradlew" -type f

          PROJECT_DIR="."
          if [ -f "./settings.gradle.kts" ] || [ -f "./settings.gradle" ]; then
            PROJECT_DIR="."
          else
            FOUND=$(find . -name "settings.gradle.kts" -o -name "settings.gradle" | head -1)
            if [ -n "$FOUND" ]; then
              PROJECT_DIR=$(dirname "$FOUND")
            fi
          fi

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo ">>> Project directory: $PROJECT_DIR"

          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$PROJECT_DIR/local.properties"
          echo ">>> local.properties created:"
          cat "$PROJECT_DIR/local.properties"

      # ── 6. Setup Gradle Wrapper ──
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Ensure Gradle Wrapper exists
        env:
          PROJECT_DIR: ${{ steps.detect.outputs.project_dir }}
        run: |
          cd "$PROJECT_DIR"
          if [ ! -f "./gradlew" ]; then
            echo ">>> gradlew not found — generating..."
            gradle wrapper --gradle-version $GRADLE_VERSION
          fi
          chmod +x ./gradlew
          echo ">>> Gradle version:"
          ./gradlew --version

      # ── 7. Build Debug APK ──
      - name: Build Debug APK
        env:
          PROJECT_DIR: ${{ steps.detect.outputs.project_dir }}
        run: |
          cd "$PROJECT_DIR"
          ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 8. Upload ──
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ${{ steps.detect.outputs.project_dir }}/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

  # ══════════════════════════════════════════════
  # Job 2: Build Release APK
  # ══════════════════════════════════════════════
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: build-debug

    env:
      CMDLINE_TOOLS_VERSION: "11076708"
      GRADLE_VERSION: "8.7"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        id: setup-java
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties', '**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Android SDK
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.java-home }}
          ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
        run: |
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-${CMDLINE_TOOLS_VERSION}_latest.zip" \
            -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-tmp
          mv /tmp/cmdline-tools-tmp/cmdline-tools "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          rm -rf /tmp/cmdline-tools.zip /tmp/cmdline-tools-tmp
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            --sdk_root="$ANDROID_SDK_ROOT" --licenses > /dev/null 2>&1 || true
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            --sdk_root="$ANDROID_SDK_ROOT" \
            "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"

      - name: Detect project and create local.properties
        id: detect
        run: |
          PROJECT_DIR="."
          if [ -f "./settings.gradle.kts" ] || [ -f "./settings.gradle" ]; then
            PROJECT_DIR="."
          else
            FOUND=$(find . -name "settings.gradle.kts" -o -name "settings.gradle" | head -1)
            if [ -n "$FOUND" ]; then
              PROJECT_DIR=$(dirname "$FOUND")
            fi
          fi
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$PROJECT_DIR/local.properties"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Ensure Gradle Wrapper exists
        env:
          PROJECT_DIR: ${{ steps.detect.outputs.project_dir }}
        run: |
          cd "$PROJECT_DIR"
          if [ ! -f "./gradlew" ]; then
            gradle wrapper --gradle-version $GRADLE_VERSION
          fi
          chmod +x ./gradlew

      # ── Check if keystore secret exists ──
      - name: Check for signing keystore
        id: check-keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "has_keystore=true" >> "$GITHUB_OUTPUT"
            echo ">>> Keystore secret found"
          else
            echo "has_keystore=false" >> "$GITHUB_OUTPUT"
            echo ">>> No keystore secret — will build unsigned"
          fi

      # ── Decode keystore ──
      - name: Decode keystore from secrets
        if: steps.check-keystore.outputs.has_keystore == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore/release.jks
          echo ">>> Keystore decoded, size: $(wc -c < keystore/release.jks) bytes"

      # ── Build Signed Release ──
      - name: Build Signed Release APK
        if: steps.check-keystore.outputs.has_keystore == 'true'
        env:
          PROJECT_DIR: ${{ steps.detect.outputs.project_dir }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd "$PROJECT_DIR"
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/keystore/release.jks" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      # ── Build Unsigned Release ──
      - name: Build Unsigned Release APK
        if: steps.check-keystore.outputs.has_keystore != 'true'
        env:
          PROJECT_DIR: ${{ steps.detect.outputs.project_dir }}
        run: |
          cd "$PROJECT_DIR"
          ./gradlew assembleRelease --no-daemon --stacktrace

      # ── Upload ──
      - name: Upload Signed Release APK
        if: steps.check-keystore.outputs.has_keystore == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          path: ${{ steps.detect.outputs.project_dir }}/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn

      - name: Upload Unsigned Release APK
        if: steps.check-keystore.outputs.has_keystore != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: ${{ steps.detect.outputs.project_dir }}/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: warn
